name: CI

on:
  push:
  pull_request:

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - run: pip install ruff

#      - run: ruff check .
#
#      - run: ruff format --check --output-format=full .

      - run: pip install -r requirements_dev.txt

      - run: pytest